<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HAL CINEMA | ポイント履歴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/visuals.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    .points-wrap {
      padding-top: 16px;
      position: relative;
      overflow: hidden;
    }

    .points-wrap::before {
      content: "";
      position: absolute;
      inset: 120px 6% auto 6%;
      height: 280px;
      background: radial-gradient(circle at 20% 20%, rgba(197, 162, 94, 0.18), transparent 55%),
        radial-gradient(circle at 80% 30%, rgba(55, 125, 194, 0.2), transparent 58%);
      filter: blur(8px);
      opacity: 0.7;
      pointer-events: none;
    }

    .points-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .points-back {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--ink-500);
      text-decoration: none;
    }

    .points-shell {
      margin-top: 18px;
      display: grid;
      gap: 20px;
    }

    .points-panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(240, 245, 252, 0.96));
      border: 1px solid rgba(200, 164, 91, 0.2);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 24px 50px rgba(18, 26, 34, 0.12);
      backdrop-filter: blur(6px);
    }

    .points-summary {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .points-summary__card {
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(10, 20, 30, 0.06);
      border: 1px solid rgba(10, 20, 30, 0.08);
    }

    .points-summary__label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6d7682;
    }

    .points-summary__value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .points-filter {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .points-filter .filter-btn {
      border-radius: 999px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(10, 20, 30, 0.12);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .points-filter .filter-btn.active {
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.95), rgba(197, 162, 94, 0.25));
      border-color: rgba(197, 162, 94, 0.35);
    }

    .points-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .points-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(10, 20, 30, 0.08);
    }

    .points-item__badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(10, 20, 30, 0.08);
      color: #46505a;
    }

    .points-item__title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .points-item__meta {
      margin-top: 4px;
      font-size: 12px;
      color: #6d7682;
    }

    .points-item__value {
      font-size: 18px;
      font-weight: 700;
    }

    .points-item--earn .points-item__badge {
      background: rgba(36, 120, 90, 0.12);
      color: #1f5b48;
    }

    .points-item--use .points-item__badge {
      background: rgba(120, 50, 70, 0.12);
      color: #7a2d40;
    }

    .points-item--earn .points-item__value {
      color: #1f5b48;
    }

    .points-item--use .points-item__value {
      color: #7a2d40;
    }

    .points-empty {
      display: none;
      text-align: center;
      padding: 48px 20px;
      color: var(--ink-500);
    }

    @media (max-width: 900px) {
      .points-summary {
        grid-template-columns: 1fr;
      }

      .points-item {
        grid-template-columns: 1fr;
        align-items: start;
      }
    }
  </style>
  <script src="js/nav.js" defer></script>
</head>
<body>
  <div class="bg-stack" aria-hidden="true">
    <span class="bg-layer bg-layer--1"></span>
    <span class="bg-layer bg-layer--2"></span>
    <span class="bg-layer bg-layer--3"></span>
    <span class="bg-layer bg-layer--4"></span>
  </div>
  <div class="accent-lines accent-lines--1" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--2" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--3" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--short-1" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--short-2" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--short-3" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--short-4" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--short-5" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--short-6" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--short-7" aria-hidden="true"></div>
  <div class="page">
    <header class="nav">
      <div class="nav__inner">
        <a class="logo" href="index.html" aria-label="HAL CINEMA ホーム">
          <img class="logo__image" src="images/logo.png" alt="HAL CINEMA" />
        </a>
        <nav class="nav__links">
          <a href="index.html">ホーム</a>
          <a href="movies.html">作品一覧</a>
          <a href="schedule.html">上映スケジュール</a>
          <a href="theaters.html">シアター</a>
          <a href="news.html">お知らせ</a>
          <a href="menu.html">料金・メニュー</a>
          <a href="mypage.html" class="nav__mypage-link" style="display:none">マイページ</a>
        </nav>
        <div class="nav__cta">
          <a href="login.html" class="btn nav__login-btn">ログイン</a>
          <button class="btn nav__logout-btn" style="display:none">ログアウト</button>
          <a href="schedule.html" class="btn btn--solid">今すぐ予約する</a>
        </div>
      </div>
    </header>

    <section class="page-hero">
      <div class="section__hint">Points</div>
      <h1 class="page-hero__title">ポイント履歴</h1>
      <p class="page-hero__lead">獲得・利用ポイントの履歴を確認できます。</p>
    </section>

    <section class="section points-wrap">
      <div class="points-top">
        <a href="mypage.html" class="points-back">← マイページに戻る</a>
      </div>

      <div class="points-shell">
        <div class="points-panel">
          <div class="points-summary">
            <div class="points-summary__card">
              <div class="points-summary__label">Total Points</div>
              <div class="points-summary__value" id="points-total">0</div>
            </div>
            <div class="points-summary__card">
              <div class="points-summary__label">Earned</div>
              <div class="points-summary__value" id="points-earned">0</div>
            </div>
            <div class="points-summary__card">
              <div class="points-summary__label">Used</div>
              <div class="points-summary__value" id="points-used">0</div>
            </div>
          </div>

          <div class="points-filter">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="earn">獲得</button>
            <button class="filter-btn" data-filter="use">利用</button>
          </div>
        </div>

        <div class="points-panel">
          <div class="points-list" id="points-list"></div>

          <div id="points-empty" class="points-empty">
            <div style="font-size:15px;letter-spacing:0.06em;margin-bottom:16px">ポイント履歴がありません</div>
            <a href="menu.html" class="btn btn--solid">ポイント特典を見る</a>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer__inner">
        <div><strong>HAL CINEMA</strong><div>想像を超える、立体シネマ体験。</div></div>
        <div><div>〒000-0000 東京都千代田区HAL 8F</div><div>OPEN 10:00 - 24:00</div></div>
        <div><div>スクリーン: 8 / 座席: 1,050</div><div>お問い合わせ: info@halcinema.jp</div></div>
      </div>
    </footer>
  </div>

  <script>
    var mockPoints = [
      { date: '5月6日（火）', title: 'オンライン予約', points: 120, type: 'earn' },
      { date: '4月22日（火）', title: 'コンボセット特典', points: 60, type: 'earn' },
      { date: '4月10日（木）', title: 'チケット交換', points: -200, type: 'use' }
    ];

    var savedPoints = JSON.parse(localStorage.getItem('hal_points_history') || '[]');
    var allPoints = savedPoints.concat(mockPoints);

    var listEl = document.getElementById('points-list');
    var emptyEl = document.getElementById('points-empty');
    var totalEl = document.getElementById('points-total');
    var earnedEl = document.getElementById('points-earned');
    var usedEl = document.getElementById('points-used');


    function updateSummary() {
      var earned = allPoints.reduce(function (sum, p) {
        return sum + (p.points > 0 ? p.points : 0);
      }, 0);
      var usedRaw = allPoints.reduce(function (sum, p) {
        return sum + (p.points < 0 ? Math.abs(p.points) : 0);
      }, 0);
      var used = Math.min(usedRaw, earned);
      var total = Math.max(earned - used, 0);
      totalEl.textContent = total.toLocaleString();
      earnedEl.textContent = earned.toLocaleString();
      usedEl.textContent = used.toLocaleString();
    }

    function renderPoints(filter) {
      var items = filter === 'all' ? allPoints : allPoints.filter(function (p) {
        return filter === 'earn' ? p.type === 'earn' : p.type === 'use';
      });

      listEl.innerHTML = '';

      if (items.length === 0) {
        emptyEl.style.display = '';
        return;
      }

      emptyEl.style.display = 'none';

      items.forEach(function (p) {
        var row = document.createElement('div');
        var isEarn = p.points >= 0;
        row.className = 'points-item ' + (isEarn ? 'points-item--earn' : 'points-item--use');
        row.innerHTML =
          '<div class="points-item__badge">' + (isEarn ? 'Earned' : 'Used') + '</div>' +
          '<div>' +
            '<div class="points-item__title">' + p.title + '</div>' +
            '<div class="points-item__meta">' + p.date + '</div>' +
          '</div>' +
          '<div class="points-item__value">' + (isEarn ? '+' : '-') + Math.abs(p.points) + '</div>';
        listEl.appendChild(row);
      });
    }


    updateSummary();
    renderPoints('all');

    document.querySelectorAll('.filter-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
        this.classList.add('active');
        renderPoints(this.dataset.filter);
      });
    });
  </script>
</body>
</html>
