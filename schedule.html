  <style>
    /* ── Timeline wrapper ─────────────────────────────────────────── */
    .tl-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(200,164,91,0.35) transparent;
      margin: 0 -20px;
    }
    .tl-wrap::-webkit-scrollbar { height: 5px; }
    .tl-wrap::-webkit-scrollbar-track { background: transparent; }
    .tl-wrap::-webkit-scrollbar-thumb { background: rgba(200,164,91,0.4); border-radius: 3px; }

    .tl-inner {
      width: max-content;
      min-width: 100%;
      position: relative;
      box-sizing: border-box;
    }

    /* ── Sticky axis wrapper (handles vertical sticky) ──────────── */
    .tl-axis-sticky {
      position: sticky;
      z-index: 19;
      overflow-x: hidden;
      margin: 0 -20px;
      transform: translateY(-1px);
    }

    /* ── Time axis ────────────────────────────────────────────────── */
    .tl-axis {
      display: flex;
      border-bottom: 1px solid rgba(200,164,91,0.22);
      box-sizing: border-box;
      clip-path: polygon(1% 0, 99% 0, 100% 50%, 99% 100%, 1% 100%, 0% 50%);
      background-color: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .tl-axis__corner {
      width: 148px;
      min-width: 148px;
      padding: 9px 0 9px 2rem;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgb(200, 164, 91);
      display: flex;
      align-items: center;
      box-sizing: border-box;
      position: sticky;
      left: 0;
      z-index: 22;
      background-color: rgba(255,255,255,0.8);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .tl-axis__hours {
      display: flex;
      flex-shrink: 0;
    }
    .tl-axis__hour {
      width: 100px;
      min-width: 100px;
      padding: 9px 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--ink-600, #4c5e7f);
      border-left: 1px solid rgba(200,164,91,0.2);
      box-sizing: border-box;
      text-indent: 5px;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    /* ── Timeline body ────────────────────────────────────────────── */
    .tl-body {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-top: 0.5rem;
    }

    /* ── Theater group ────────────────────────────────────────────── */
    .tl-group {
      position: relative;
      border-radius: 5px 0 0 0;
      background-color: #fdfdfda2;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    /* Per-theater track tint */
    .tl-group--starry   .tl-row__track { background: rgba(200,164,91,0.07); }
    .tl-group--abyss    .tl-row__track { background: rgba(10,61,82,0.07); }
    .tl-group--cyber    .tl-row__track { background: rgba(40,100,220,0.07); }

    /* Per-theater label left accent */
    .tl-group--starry   .tl-row__label { border-left: 3px solid rgba(200,164,91,0.55);  padding-left: 11px; }
    .tl-group--abyss    .tl-row__label { border-left: 3px solid rgba(18,104,130,0.45); padding-left: 11px; }
    .tl-group--cyber    .tl-row__label { border-left: 3px solid rgba(40,100,220,0.5); padding-left: 11px; }

    /* ── Theater group header ─────────────────────────────────────── */
    .tl-theater-head {
      display: flex;
      height: 32px;
      border-radius: 5px 0 0 0;
    }

    .tl-theater-head__label {
      width: 148px;
      min-width: 148px;
      padding: 0 12px 0 12px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 5px 0 0 0;
      box-sizing: border-box;
      position: sticky;
      left: 0;
      z-index: 6;
    }
    .tl-theater-head__dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      flex-shrink: 0;
    }
    .tl-theater-head__bar {
      flex-shrink: 0;
      border-radius: 0 5px 5px 0;
      box-sizing: border-box;
    }

    .tl-theater-head--starry .tl-theater-head__label   { background: linear-gradient(90deg, #2a1c04 0%, #6b4a14 100%); }
    .tl-theater-head--starry .tl-theater-head__bar     { background: linear-gradient(90deg, #6b4a14 0%, rgba(200,164,91,0.22) 45%, transparent 85%); }
    .tl-theater-head--abyss .tl-theater-head__label    { background: linear-gradient(90deg, #0a3d52 0%, #126882 100%); }
    .tl-theater-head--abyss .tl-theater-head__bar      { background: linear-gradient(90deg, #126882 0%, rgba(18,104,130,0.18) 45%, transparent 85%); }
    .tl-theater-head--cyber    .tl-theater-head__label { background: linear-gradient(90deg, #060d22 0%, #0d2060 100%); }
    .tl-theater-head--cyber    .tl-theater-head__bar   { background: linear-gradient(90deg, #0d2060 0%, rgba(40,100,220,0.22) 45%, transparent 85%); }

    /* ── Screen row ───────────────────────────────────────────────── */
    .tl-row {
      display: flex;
      height: 76px;
      border-top: 1px solid rgba(200,164,91,0.1);
    }
    .tl-row:last-of-type { border-bottom: 1px solid rgba(200,164,91,0.1); }

    .tl-row__label {
      width: 148px;
      min-width: 148px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      background: #e8f0fcd8;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      position: sticky;
      left: 0;
      z-index: 5;
      border-right: 1px solid rgba(200,164,91,0.12);
      box-sizing: border-box;
    }
    .tl-row__screen {
      margin: 0 auto;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-700, #3a4f6c);
    }

    /* ── Track area ───────────────────────────────────────────────── */
    .tl-row__track {
      flex-shrink: 0;
      height: 76px;
      position: relative;
      background-image:
        repeating-linear-gradient(
          90deg,
          rgba(200,164,91,0.16) 0px,
          rgba(200,164,91,0.16) 1px,
          transparent 1px,
          transparent 100px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(200,164,91,0.07) 0px,
          rgba(200,164,91,0.07) 1px,
          transparent 1px,
          transparent 50px
        );
      box-sizing: border-box;
    }

    /* ── Movie block ──────────────────────────────────────────────── */
    .tl-block {
      position: absolute;
      top: 8px;
      height: 60px;
      border-radius: 10px;
      padding: 7px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 3px 14px rgba(6,13,31,0.24), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: filter 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      box-sizing: border-box;
      min-width: 0;
    }
    .tl-block:hover {
      filter: brightness(1.14);
      box-shadow: 0 10px 28px rgba(6,13,31,0.32), inset 0 1px 0 rgba(255,255,255,0.12);
    }

    /* Theater border only — background is set per-movie via JS */
    .tl-block           { background: linear-gradient(150deg, #1a2a4a, #2a4878); }
    .tl-block--taken    { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

    .tl-block__time {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.95);
      line-height: 1;
      flex-shrink: 0;
    }
    .tl-block__title {
      font-size: 11px;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.82);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }
    .tl-block__foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-shrink: 0;
    }
    .tl-block__seats {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }
    .tl-block__seats--few { color: #f5a623; font-weight: 700; }
    .tl-block__format {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.32);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Now line ─────────────────────────────────────────────────── */
    .tl-now-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, rgba(200,164,91,0.9), rgba(200,164,91,0.1));
      pointer-events: none;
      z-index: 12;
    }
    .tl-now-dot {
      position: absolute;
      top: -3px;
      left: -4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(200,164,91,0.95);
      box-shadow: 0 0 0 0 rgba(200,164,91,0.5);
      animation: tl-pulse 2.2s ease-out infinite;
    }
    @keyframes tl-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(200,164,91,0.5); }
      70%  { box-shadow: 0 0 0 9px rgba(200,164,91,0); }
      100% { box-shadow: 0 0 0 0 rgba(200,164,91,0); }
    }
    .tl-now-time {
      position: absolute;
      top: 6px;
      left: 7px;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: rgba(200,164,91,0.98);
      white-space: nowrap;
      background: rgba(235,242,252,0.93);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(200,164,91,0.4);
      pointer-events: none;
    }

    /* ── Date label ───────────────────────────────────────────────── */
    .sched-date-label {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--ink-700);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sched-date-label::before {
      content: "";
      width: 18px;
      height: 1px;
      background: var(--gold-500);
      flex-shrink: 0;
    }

    /* ── Top bar: date label + filter ─────────────────────────────── */
    .sched-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin: 2rem 0 1rem 0;
    }

    /* ── Empty state ──────────────────────────────────────────────── */
    .sched-empty {
      text-align: center;
      padding: 64px 20px;
      color: var(--ink-500);
      font-size: 15px;
      letter-spacing: 0.06em;
    }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .tl-axis__corner,
      .tl-row__label,
      .tl-theater-head__label { width: 72px; min-width: 72px; }
      .tl-theater-head__label { font-size: 8px; letter-spacing: 0.18em; }
    }
  </style>
</head>

        id: 'cyber', screen: 'Screen 3',
        shows: [
          { movieId: 'placeholder-2',  title: '街角の交響曲',             start: '12:00', duration: 104, format: '字幕・吹替', taken: true },
          { movieId: 'placeholder-2',  title: '街角の交響曲',             start: '16:30', duration: 104, format: '字幕・吹替', seats: 34 },
          { movieId: 'thank-you-chuck', title: '[字幕] サンキュー、チャック', start: '20:00', duration: 118, format: '字幕', seats: 58 },
        ]
      },
    ];

    /* ── Helpers ───────────────────────────────────────────────────── */
    function toMin(t) {
      var p = t.split(':');
      return +p[0] * 60 + +p[1];
    }
    function timeLeft(t) {
      return (toMin(t) - TL_START * 60) / 60 * PX_HR;
    }
    function durWidth(min) {
      return min / 60 * PX_HR - 4;
    }

    /* ── Build axis ────────────────────────────────────────────────── */
    function buildAxis() {
      var el = document.getElementById('tl-hours');
      for (var h = TL_START; h < TL_END; h++) {
        var d = document.createElement('div');
        d.className = 'tl-axis__hour';
        d.textContent = h + ':00';
        el.appendChild(d);
      }
    }

    /* ── Date strip ────────────────────────────────────────────────── */
    function buildDateStrip() {
      var strip = document.getElementById('date-strip');
      for (var i = 0; i < 14; i++) {
        var d = new Date(today);
        d.setDate(today.getDate() + i);
        (function(idx, date) {
          var btn = document.createElement('button');
          btn.className = 'date-btn' + (idx === 0 ? ' active' : '');
          btn.innerHTML =
            '<span class="date-btn__day">'   + DAYS[date.getDay()]    + '</span>' +
            '<span class="date-btn__num">'   + date.getDate()         + '</span>' +
            '<span class="date-btn__month">' + MONTHS[date.getMonth()] + '</span>';
          btn.addEventListener('click', function() {
            strip.querySelectorAll('.date-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            selectedDate = date;
            updateDateLabel();
            renderTimeline();
          });
          strip.appendChild(btn);
        })(i, d);
      }
    }

    function updateDateLabel() {
      document.getElementById('date-label').textContent =
        MONTHS[selectedDate.getMonth()] + selectedDate.getDate() +
        '日（' + DAYS[selectedDate.getDay()] + '）の上映スケジュール';
    }

    /* ── Now indicator ─────────────────────────────────────────────── */
    function buildNowLine() {
      var now = new Date();
      if (selectedDate.toDateString() !== now.toDateString()) return null;
      var min = now.getHours() * 60 + now.getMinutes();
      if (min < TL_START * 60 || min > TL_END * 60) return null;

      var left = LABEL_W + (min - TL_START * 60) / 60 * PX_HR;
      var line = document.createElement('div');
      line.className = 'tl-now-line';
      line.style.left = left + 'px';

      var dot = document.createElement('div');
      dot.className = 'tl-now-dot';
      line.appendChild(dot);

      var lbl = document.createElement('div');
      lbl.className = 'tl-now-time';
      var h = now.getHours(), m = now.getMinutes();
      lbl.textContent = h + ':' + (m < 10 ? '0' : '') + m;
      line.appendChild(lbl);

      return line;
    }

    /* ── Render timeline ───────────────────────────────────────────── */
    function renderTimeline() {
      var body     = document.getElementById('tl-body');
      var emptyEl  = document.getElementById('schedule-empty');
      body.innerHTML = '';
      var anyVisible = false;

      THEATERS.forEach(function(theater) {
        if (activeTheater !== 'all' && theater.id !== activeTheater) return;
        var screens = SCREENS.filter(function(s) { return s.id === theater.id; });
        if (!screens.length) return;
        anyVisible = true;

        /* Theater group wrapper */
        var group = document.createElement('div');
        group.className = 'tl-group tl-group--' + theater.id;

        /* Theater group header */
        var head = document.createElement('div');
        head.className = 'tl-theater-head tl-theater-head--' + theater.id;
        var headBar = document.createElement('div');
        headBar.className = 'tl-theater-head__bar';
        headBar.style.width = TRACK_W + 'px';
        head.innerHTML = '<div class="tl-theater-head__label"><span class="tl-theater-head__dot"></span>' + theater.label + '</div>';
        head.appendChild(headBar);
        group.appendChild(head);

        /* Screen rows */
        screens.forEach(function(screen) {
          var row = document.createElement('div');
          row.className = 'tl-row';

          /* Label */
          var label = document.createElement('div');
          label.className = 'tl-row__label';
          label.innerHTML = '<span class="tl-row__screen">' + screen.screen + '</span>';
          row.appendChild(label);

          /* Track */
          var track = document.createElement('div');
          track.className = 'tl-row__track';
          track.style.width = TRACK_W + 'px';

          /* Movie blocks */
          screen.shows.forEach(function(show) {
            var left  = timeLeft(show.start);
            var width = durWidth(show.duration);
            var taken = !!show.taken;
            var few   = !taken && show.seats <= 30;

            var block = document.createElement(taken ? 'div' : 'a');
            block.className = 'tl-block tl-block--' + screen.id + (taken ? ' tl-block--taken' : '');
            block.style.left  = left  + 'px';
            block.style.width = width + 'px';

            var mc = MOVIE_COLORS[show.movieId];
            if (mc) {
              block.style.background =
                'linear-gradient(to right, ' + mc.solid + ' 0%, ' + mc.solid + ' 46%, ' + mc.fade + ' 90%),' +
                'url(\'' + mc.poster + '\') center / cover no-repeat';
            }

            if (!taken) {
              block.href = '#';
              block.dataset.theaterId  = screen.id;
              block.dataset.screen     = screen.screen;
              block.dataset.time       = show.start;
              block.dataset.movieId    = show.movieId;
              block.dataset.movieTitle = show.title;
            }

            var seatsHtml;
            if (taken) {
              seatsHtml = '<span class="tl-block__seats">満席</span>';
            } else {
              seatsHtml = '<span class="tl-block__seats' + (few ? ' tl-block__seats--few' : '') + '">残席' + show.seats + '</span>';
            }

            block.innerHTML =
              '<span class="tl-block__time">' + show.start + '</span>' +
              '<span class="tl-block__title">' + show.title + '</span>' +
              '<div class="tl-block__foot">' +
                seatsHtml +
                '<span class="tl-block__format">' + show.format + '</span>' +
              '</div>';

            track.appendChild(block);
          });

          row.appendChild(track);
          group.appendChild(row);
        });

        body.appendChild(group);
      });

      /* Now line */
      var nowLine = buildNowLine();
      if (nowLine) body.appendChild(nowLine);

      /* Booking click */
      body.querySelectorAll('.tl-block[data-theater-id]').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          var map = { starry: 'Starry', abyss: 'Abyss', cyber: 'Cyber' };
          localStorage.setItem('hal_booking', JSON.stringify({
            theater:    map[this.dataset.theaterId],
            screen:     this.dataset.screen,
            time:       this.dataset.time,
            movieId:    this.dataset.movieId,
            movieTitle: this.dataset.movieTitle,
            date:       selectedDate.toISOString().split('T')[0],
            dateLabel:  MONTHS[selectedDate.getMonth()] + selectedDate.getDate() +
                        '日（' + DAYS[selectedDate.getDay()] + '）'
          }));
          window.location.href = 'seats.html';
        });
      });

      emptyEl.style.display = anyVisible ? 'none' : '';
    }

    /* ── Scroll to current time ────────────────────────────────────── */
    function scrollToNow() {
      var now = new Date();
      if (selectedDate.toDateString() !== now.toDateString()) return;
      var min = now.getHours() * 60 + now.getMinutes();
      var offset = (min - TL_START * 60 - 60) / 60 * PX_HR; // 1h before now
      document.getElementById('tl-wrap').scrollLeft = Math.max(0, offset);
    }

    /* ── Theater filter ────────────────────────────────────────────── */
    document.querySelectorAll('#theater-filter .filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#theater-filter .filter-btn').forEach(function(b) {
          b.classList.remove('active');
        });
        btn.classList.add('active');
        activeTheater = btn.dataset.theater;
        renderTimeline();
      });
    });

    /* ── Sticky axis: set top to nav height + sync horizontal scroll ── */
    (function() {
      var nav = document.querySelector('.nav');
      var axisSticky = document.getElementById('tl-axis-sticky');
      var wrap = document.getElementById('tl-wrap');
      if (nav && axisSticky) {
        axisSticky.style.top = nav.offsetHeight + 'px';
      }
      if (wrap && axisSticky) {
        wrap.addEventListener('scroll', function() {
          axisSticky.scrollLeft = wrap.scrollLeft;
        });
      }
    })();

    /* ── Init ──────────────────────────────────────────────────────── */
    buildAxis();
    buildDateStrip();
    updateDateLabel();
    renderTimeline();
    scrollToNow();
  </script>
</body>
</html>
