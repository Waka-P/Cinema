<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HAL CINEMA | 上映スケジュール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/visuals.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <script src="js/parallax-bg.js" defer></script>
  <script src="js/nav.js" defer></script>
  <style>
    .sched-block {
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), #f4f7fb);
      border: 1px solid rgba(200,164,91,0.16);
      box-shadow: 0 8px 28px rgba(10,22,40,0.08);
      margin-bottom: 20px;
    }
    .sched-block__header {
      padding: 18px 24px;
      background: linear-gradient(130deg, #080f22, #0b2249 55%, #1a4080);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }
    .sched-block__header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 90% 50%, rgba(200,164,91,0.12), transparent 55%);
      pointer-events: none;
    }
    .sched-block__header > * { position: relative; z-index: 1; }
    .sched-block__type {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(200,164,91,0.8);
      margin-bottom: 4px;
    }
    .sched-block__hall {
      font-size: 20px;
      letter-spacing: 0.08em;
    }
    .sched-block__cap {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 13px;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.45);
      text-align: right;
    }

    .sched-entry {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 18px;
      padding: 20px 24px;
      border-top: 1px solid rgba(200,164,91,0.1);
      align-items: start;
    }
    .sched-entry__poster {
      width: 76px;
      height: 108px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      display: block;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(8,20,48,0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      flex-shrink: 0;
    }
    .sched-entry__poster:hover {
      transform: scale(1.04);
      box-shadow: 0 10px 26px rgba(8,20,48,0.32);
    }
    .sched-entry__genre {
      font-size: 10px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold-600);
      margin-bottom: 5px;
    }
    .sched-entry__title {
      font-size: 16px;
      letter-spacing: 0.06em;
      color: var(--ink-900);
      text-decoration: none;
      display: block;
      margin-bottom: 6px;
      line-height: 1.4;
      transition: color 0.15s ease;
    }
    .sched-entry__title:hover { color: var(--gold-600); }
    .sched-entry__meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--ink-500);
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .sched-entry__meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(200,164,91,0.5);
      flex-shrink: 0;
    }

    .sched-times { display: flex; flex-wrap: wrap; gap: 7px; }

    .sched-time {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 13px;
      border-radius: 11px;
      border: 1px solid rgba(200,164,91,0.22);
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
      min-width: 72px;
    }
    .sched-time:hover {
      background: linear-gradient(135deg, #0b2249, #1a4080);
      border-color: rgba(200,164,91,0.55);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(11,34,73,0.25);
    }
    .sched-time--taken {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .sched-time__clock {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 19px;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--ink-900);
    }
    .sched-time:hover .sched-time__clock { color: white; }
    .sched-time__avail {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--ink-500);
      white-space: nowrap;
    }
    .sched-time:hover .sched-time__avail { color: rgba(255,255,255,0.65); }
    .sched-time--few .sched-time__avail { color: #c05820; font-weight: 600; }

    .sched-date-label {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--ink-700);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sched-date-label::before {
      content: "";
      display: inline-block;
      width: 18px;
      height: 1px;
      background: var(--gold-500);
    }

    @media (max-width: 560px) {
      .sched-entry { grid-template-columns: 60px 1fr; gap: 12px; padding: 16px 16px; }
      .sched-entry__poster { width: 60px; height: 86px; }
      .sched-block__header { padding: 14px 16px; }
      .sched-entry__title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="bg-stack" aria-hidden="true">
    <span class="bg-layer bg-layer--1"></span>
    <span class="bg-layer bg-layer--2"></span>
    <span class="bg-layer bg-layer--3"></span>
    <span class="bg-layer bg-layer--4"></span>
  </div>
  <div class="accent-lines accent-lines--1" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--2" aria-hidden="true"></div>
  <div class="accent-lines accent-lines--3" aria-hidden="true"></div>
  <div class="page">
    <header class="nav">
      <div class="nav__inner">
        <a class="logo" href="index.html" aria-label="HAL CINEMA ホーム">
          <img class="logo__image" src="images/logo.png" alt="HAL CINEMA" />
        </a>
        <nav class="nav__links">
          <a href="index.html">ホーム</a>
          <a href="movies.html">作品一覧</a>
          <a href="schedule.html">上映スケジュール</a>
          <a href="theaters.html">シアター</a>
          <a href="news.html">お知らせ</a>
          <a href="menu.html">料金・メニュー</a>
          <a href="mypage.html" class="nav__mypage-link" style="display:none">マイページ</a>
        </nav>
        <div class="nav__cta">
          <a href="login.html" class="btn nav__login-btn">ログイン</a>
          <button class="btn nav__logout-btn" style="display:none">ログアウト</button>
          <a href="schedule.html" class="btn btn--solid">今すぐ予約する</a>
        </div>
      </div>
    </header>

    <section class="page-hero">
      <div class="section__hint">Showtime</div>
      <h1 class="page-hero__title">上映スケジュール</h1>
      <p class="page-hero__lead">日付・作品・シアターから上映時間をご確認ください。時間をクリックして予約へ。</p>
    </section>

    <section class="section" style="padding-top: 16px;">

      <!-- Date strip -->
      <div class="date-strip" id="date-strip"></div>

      <!-- Active date label -->
      <div class="sched-date-label" id="date-label"></div>

      <!-- Theater filter -->
      <div class="news-filter" id="theater-filter" style="margin-bottom:28px">
        <button class="filter-btn active" data-theater="all">すべてのシアター</button>
        <button class="filter-btn" data-theater="starry">Starry Theater</button>
        <button class="filter-btn" data-theater="abyss">Abyss Theater</button>
        <button class="filter-btn" data-theater="standard">Standard Theater</button>
      </div>

      <!-- Schedule blocks -->
      <div id="schedule-container"></div>

      <div id="schedule-empty" style="display:none;text-align:center;padding:48px 20px;color:var(--ink-500)">
        <div style="font-size:15px;letter-spacing:0.06em">該当する上映がありません</div>
      </div>

    </section>

    <footer class="footer">
      <div class="footer__inner">
        <div><strong>HAL CINEMA</strong><div>想像を超える、立体シネマ体験。</div></div>
        <div><div>〒000-0000 東京都千代田区HAL 8F</div><div>OPEN 10:00 - 24:00</div></div>
        <div><div>スクリーン: 8 / 座席: 1,050</div><div>お問い合わせ: info@halcinema.jp</div></div>
      </div>
    </footer>
  </div>

  <script>
    var DAYS   = ['日','月','火','水','木','金','土'];
    var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    var today  = new Date();
    var selectedDate = today;
    var activeTheater = 'all';

    var SCHEDULE = [
      {
        id: 'starry',
        type: 'Starry Theater',
        hall: 'Solaris Dome',
        cap: '200席 × 3スクリーン',
        entries: [
          {
            movieId: 'why-write-love-letters',
            title: '人はなぜラブレターを書くのか',
            genre: 'ドラマ',
            duration: '2h 18m',
            format: '吹替',
            screen: 'Screen 1',
            poster: 'images/thumbnail/thumb2.jpg',
            showtimes: [
              { time: '10:30', seats: 68 },
              { time: '14:20', seats: 42 },
              { time: '18:00', taken: true },
            ]
          },
          {
            movieId: 'thank-you-chuck',
            title: '[字幕] サンキュー、チャック',
            genre: 'ミステリー',
            duration: '1h 58m',
            format: '字幕',
            screen: 'Screen 1',
            poster: 'images/thumbnail/thumb1.jpg',
            showtimes: [
              { time: '21:10', seats: 115 }
            ]
          }
        ]
      },
      {
        id: 'abyss',
        type: 'Abyss Theater',
        hall: 'Abyss Hall',
        cap: '120席 × 2スクリーン',
        entries: [
          {
            movieId: 'placeholder-1',
            title: '夜明けの航海',
            genre: 'アドベンチャー',
            duration: '1h 52m',
            format: '吹替',
            screen: 'Screen 2',
            poster: 'images/thumbnail/thumb3.jpg',
            showtimes: [
              { time: '11:00', seats: 54 }
            ]
          },
          {
            movieId: 'why-write-love-letters',
            title: '人はなぜラブレターを書くのか',
            genre: 'ドラマ',
            duration: '2h 18m',
            format: '吹替',
            screen: 'Screen 2',
            poster: 'images/thumbnail/thumb2.jpg',
            showtimes: [
              { time: '15:45', seats: 21 }
            ]
          },
          {
            movieId: 'placeholder-2',
            title: '街角の交響曲',
            genre: '音楽',
            duration: '1h 44m',
            format: '字幕',
            screen: 'Screen 2',
            poster: 'images/thumbnail/thumb4.jpg',
            showtimes: [
              { time: '19:30', seats: 88 }
            ]
          }
        ]
      },
      {
        id: 'standard',
        type: 'Standard Theater',
        hall: 'Classic Studio',
        cap: '70席 × 3スクリーン',
        entries: [
          {
            movieId: 'placeholder-2',
            title: '街角の交響曲',
            genre: '音楽',
            duration: '1h 44m',
            format: '字幕・吹替',
            screen: 'Screen 3',
            poster: 'images/thumbnail/thumb4.jpg',
            showtimes: [
              { time: '12:00', taken: true },
              { time: '16:30', seats: 34 }
            ]
          },
          {
            movieId: 'thank-you-chuck',
            title: '[字幕] サンキュー、チャック',
            genre: 'ミステリー',
            duration: '1h 58m',
            format: '字幕',
            screen: 'Screen 3',
            poster: 'images/thumbnail/thumb1.jpg',
            showtimes: [
              { time: '20:00', seats: 58 }
            ]
          }
        ]
      }
    ];

    // ── Date strip ────────────────────────────────────────────────────
    function buildDateStrip() {
      var strip = document.getElementById('date-strip');
      for (var i = 0; i < 14; i++) {
        var d = new Date(today);
        d.setDate(today.getDate() + i);
        (function(idx, date) {
          var btn = document.createElement('button');
          btn.className = 'date-btn' + (idx === 0 ? ' active' : '');
          btn.innerHTML =
            '<span class="date-btn__day">' + DAYS[date.getDay()] + '</span>' +
            '<span class="date-btn__num">' + date.getDate() + '</span>' +
            '<span class="date-btn__month">' + MONTHS[date.getMonth()] + '</span>';
          btn.addEventListener('click', function() {
            strip.querySelectorAll('.date-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            selectedDate = date;
            updateDateLabel();
          });
          strip.appendChild(btn);
        })(i, d);
      }
    }

    function updateDateLabel() {
      document.getElementById('date-label').textContent =
        MONTHS[selectedDate.getMonth()] + selectedDate.getDate() + '日（' + DAYS[selectedDate.getDay()] + '）の上映スケジュール';
    }

    // ── Render schedule ───────────────────────────────────────────────
    function renderSchedule() {
      var container = document.getElementById('schedule-container');
      var emptyEl   = document.getElementById('schedule-empty');
      container.innerHTML = '';
      var anyVisible = false;

      SCHEDULE.forEach(function(theater) {
        if (activeTheater !== 'all' && theater.id !== activeTheater) return;
        var entries = theater.entries;
        if (entries.length === 0) return;
        anyVisible = true;

        var block = document.createElement('div');
        block.className = 'sched-block';

        // Theater header
        var header = document.createElement('div');
        header.className = 'sched-block__header';
        header.innerHTML =
          '<div>' +
            '<div class="sched-block__type">' + theater.type + '</div>' +
            '<div class="sched-block__hall">' + theater.hall + '</div>' +
          '</div>' +
          '<div class="sched-block__cap">' + theater.cap + '</div>';
        block.appendChild(header);

        // Movie entries
        entries.forEach(function(entry) {
          var timesHtml = entry.showtimes.map(function(st) {
            if (st.taken) {
              return '<span class="sched-time sched-time--taken">' +
                '<span class="sched-time__clock">' + st.time + '</span>' +
                '<span class="sched-time__avail">満席</span>' +
                '</span>';
            }
            var fewClass = st.seats <= 30 ? ' sched-time--few' : '';
            return '<a class="sched-time' + fewClass + '" href="#"' +
              ' data-theater="' + theater.id + '"' +
              ' data-screen="' + entry.screen + '"' +
              ' data-time="' + st.time + '"' +
              ' data-movie-id="' + entry.movieId + '"' +
              ' data-movie-title="' + entry.title.replace(/"/g, '&quot;') + '">' +
              '<span class="sched-time__clock">' + st.time + '</span>' +
              '<span class="sched-time__avail">残席' + st.seats + '</span>' +
              '</a>';
          }).join('');

          var entryEl = document.createElement('div');
          entryEl.className = 'sched-entry';
          entryEl.innerHTML =
            '<a class="sched-entry__poster" href="movie-detail.html?id=' + entry.movieId + '" style="background-image:url(\'' + entry.poster + '\')"></a>' +
            '<div>' +
              '<div class="sched-entry__genre">' + entry.genre + '</div>' +
              '<a class="sched-entry__title" href="movie-detail.html?id=' + entry.movieId + '">' + entry.title + '</a>' +
              '<div class="sched-entry__meta">' +
                '<span>' + entry.duration + '</span>' +
                '<span class="sched-entry__meta-dot"></span>' +
                '<span>' + entry.format + '</span>' +
                '<span class="sched-entry__meta-dot"></span>' +
                '<span>' + entry.screen + '</span>' +
              '</div>' +
              '<div class="sched-times">' + timesHtml + '</div>' +
            '</div>';
          block.appendChild(entryEl);
        });

        container.appendChild(block);
      });

      // Attach booking listeners
      container.querySelectorAll('.sched-time[data-theater]').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          var theaterMap = { starry: 'Starry', abyss: 'Abyss', standard: 'Standard' };
          var booking = {
            theater:    theaterMap[this.dataset.theater],
            screen:     this.dataset.screen,
            time:       this.dataset.time,
            movieId:    this.dataset.movieId,
            movieTitle: this.dataset.movieTitle,
            date:       selectedDate.toISOString().split('T')[0],
            dateLabel:  MONTHS[selectedDate.getMonth()] + selectedDate.getDate() + '日（' + DAYS[selectedDate.getDay()] + '）'
          };
          localStorage.setItem('hal_booking', JSON.stringify(booking));
          window.location.href = 'seats.html';
        });
      });

      emptyEl.style.display = anyVisible ? 'none' : '';
    }

    // ── Theater filter ────────────────────────────────────────────────
    document.querySelectorAll('#theater-filter .filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#theater-filter .filter-btn').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        activeTheater = this.dataset.theater;
        renderSchedule();
      });
    });

    // ── Init ──────────────────────────────────────────────────────────
    buildDateStrip();
    updateDateLabel();
    renderSchedule();
  </script>
</body>
</html>
